<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MNDR">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Maternal & Neonatal Death Reporting System">
  
  <title>MNDR | Maternal & Neonatal Death Reporting</title>
  
  <!-- Manifest for PWA -->
  <link rel="manifest" href="data:application/manifest+json,{
    'name': 'MNDR Platform',
    'short_name': 'MNDR',
    'description': 'Maternal & Neonatal Death Reporting',
    'theme_color': '#0f172a',
    'background_color': '#0f172a',
    'display': 'standalone',
    'orientation': 'portrait',
    'scope': '/',
    'start_url': '/',
    'icons': [
      {
        'src': 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f172a%22/><text x=%2250%22 y=%2265%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22>🏥</text></svg>',
        'sizes': '512x512',
        'type': 'image/svg+xml',
        'purpose': 'any maskable'
      }
    ]
  }">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- SheetJS for Excel Export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    .platform-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Install Prompt */
    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 16px 24px;
      border-radius: 60px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10000;
      max-width: 90%;
      animation: slideUp 0.3s ease;
    }

    .install-prompt.hidden {
      display: none;
    }

    @keyframes slideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    .install-btn {
      background: #0f172a;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .close-install {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #64748b;
      padding: 0 8px;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-size: 1.2rem;
      flex-direction: column;
      gap: 20px;
    }

    .loading-screen.hidden {
      display: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Connection Status */
    .connection-status {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ef4444;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 0.9rem;
      z-index: 1000;
      transform: translateY(-100%);
      transition: transform 0.3s;
    }

    .connection-status.offline {
      transform: translateY(0);
    }

    /* Auth Screens - Mobile Optimized */
    .auth-screen {
      max-width: 100%;
      margin: 20px auto;
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    @media (min-width: 520px) {
      .auth-screen {
        max-width: 480px;
        margin: 40px auto;
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: clamp(1.8rem, 8vw, 2.2rem);
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: #64748b;
      font-size: 1rem;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 20px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #64748b;
    }

    .auth-tab.active {
      background: white;
      color: #0f172a;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .auth-form {
      display: block;
    }

    .auth-form.hidden {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      color: #334155;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1rem;
      transition: border-color 0.2s;
      background: white;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 400px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    .auth-btn {
      width: 100%;
      padding: 18px;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-btn:active {
      background: #1e293b;
      transform: scale(0.98);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .auth-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
   const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
    .success-message {
      color: #16a34a;
      font-size: 0.9rem;
      margin-top: 8px;
      text-align: center;
    }

    /* Main App */
    .main-app {
      display: none;
    }

    .app-header {
      background: white;
      border-radius: 24px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
      gap: 12px;
    }

    .app-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f172a;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .user-name {
      font-weight: 600;
      color: #0f172a;
      font-size: 0.95rem;
    }

    .user-facility {
      font-size: 0.8rem;
      color: #64748b;
    }

    .role-badge {
      padding: 6px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .role-badge.admin {
      background: #fef3c7;
      color: #92400e;
    }

    .role-badge.facility {
      background: #dbeafe;
      color: #1e40af;
    }

    .logout-btn {
      padding: 8px 12px;
      background: #f1f5f9;
      border: none;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: #64748b;
      font-size: 0.9rem;
    }

    /* Dashboard Styles */
    .facility-dashboard, .admin-dashboard {
      background: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .screen-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .screen-subtitle {
      color: #64748b;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .dashboard-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .dashboard-btn {
      padding: 14px 20px;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      min-width: 140px;
      -webkit-tap-highlight-color: transparent;
    }

    .dashboard-btn:active {
      transform: scale(0.98);
    }

    .export-btn {
      background: #16a34a;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    @media (min-width: 640px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .stat-card {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      border-radius: 16px;
      padding: 20px 16px;
      border: 1px solid #cbd5e1;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
    }

    .stat-label {
      color: #475569;
      margin-top: 4px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    /* Tables - Mobile Scroll */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -20px;
      padding: 0 20px;
    }

    .reports-table, .facility-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 0.9rem;
      min-width: 600px;
    }

    .reports-table th, .facility-table th {
      text-align: left;
      padding: 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #334155;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
    }

    .reports-table td, .facility-table td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      color: #475569;
    }

    /* Form Screens */
    .death-count-screen, 
    .zero-report-screen, 
    .death-form-screen,
    .my-reports-screen,
    .success-screen {
      background: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .count-input-group {
      margin: 32px 0;
    }

    .count-input-group label {
      display: block;
      font-weight: 600;
      color: #334155;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    .count-input-group input {
      width: 100%;
      padding: 18px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1.2rem;
      -webkit-appearance: none;
    }

    .death-type-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 24px 0;
    }

    @media (min-width: 500px) {
      .death-type-selector {
        flex-direction: row;
      }
    }

    .death-type-card {
      flex: 1;
      padding: 20px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .death-type-card:active {
      transform: scale(0.98);
    }

    .death-type-card.selected {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .death-type-card .icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .death-type-card h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .death-type-card p {
      font-size: 0.85rem;
      color: #64748b;
    }

    .unique-code-section {
      background: #f8fafc;
      border-radius: 20px;
      padding: 20px;
      margin: 24px 0;
      border: 1px dashed #94a3b8;
    }

    .code-format-info {
      background: #e0f2fe;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .form-field.full-width {
      grid-column: span 1;
    }

    @media (min-width: 640px) {
      .form-field.full-width {
        grid-column: span 2;
      }
    }

    .form-field label {
      display: block;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .form-field input, 
    .form-field select, 
    .form-field textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      -webkit-appearance: none;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #0f172a;
      color: white;
      flex: 1;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .hidden {
      display: none !important;
    }

    .success-screen {
      text-align: center;
      padding: 48px 24px;
    }

    .success-screen .icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .success-screen h3 {
      font-size: 1.8rem;
      margin-bottom: 16px;
      color: #16a34a;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      background: #f8fafc;
      padding: 16px;
      border-radius: 16px;
    }

    @media (min-width: 640px) {
      .filter-bar {
        flex-direction: row;
        align-items: center;
      }
    }

    .filter-bar select,
    .filter-bar input {
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      background: white;
    }

    .date-range {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-badge.active {
      background: #dcfce7;
      color: #16a34a;
    }

    /* Demo notice */
    .demo-notice {
      text-align: center;
      margin-top: 16px;
      color: #94a3b8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div class="platform-container">
  
  <!-- Connection Status -->
  <div id="connectionStatus" class="connection-status">
    📡 No Internet Connection - Working Offline
  </div>
  
  <!-- Install Prompt -->
  <div id="installPrompt" class="install-prompt hidden">
    <span>📱 Install MNDR App</span>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="close-install" id="closeInstallBtn">&times;</button>
  </div>
  
  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <span>Loading MNDR Platform...</span>
  </div>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-header">
      <h1>🏥 MNDR</h1>
      <p>Maternal & Neonatal Death Reporting</p>
    </div>
    
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="register">Register</button>
      <button class="auth-tab" data-tab="admin">Admin</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="auth-form">
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="loginEmail" placeholder="facility@hospital.gov.ph" inputmode="email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="loginBtn">Sign In</button>
      <div id="loginError" class="error-message"></div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="auth-form hidden">
      <div class="form-group">
        <label>📧 Gmail Address *</label>
        <input type="email" id="regEmail" placeholder="facility@gmail.com" inputmode="email">
      </div>
      <div class="form-group">
        <label>👤 Full Name *</label>
        <input type="text" id="regFullName" placeholder="Maria Santos Cruz" autocomplete="name">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>👤 Username *</label>
          <input type="text" id="regUsername" placeholder="username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>🔒 Password *</label>
          <input type="password" id="regPassword" placeholder="Min. 6 chars" autocomplete="new-password">
        </div>
      </div>
      <div class="form-group">
        <label>🏥 Facility *</label>
        <select id="regFacility">
          <option value="">-- Select --</option>
          <option value="Ayala District Hospital">Ayala District Hospital</option>
          <option value="Zamboanga City Medical Center">Zamboanga City Medical Center</option>
          <option value="Recodo Rural Health Unit">Recodo Rural Health Unit</option>
          <option value="Mercedes Birthing Home">Mercedes Birthing Home</option>
          <option value="Sta. Maria Maternity Clinic">Sta. Maria Maternity Clinic</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group hidden" id="otherFacilityGroup">
        <label>Specify Facility</label>
        <input type="text" id="regOtherFacility" placeholder="Facility name">
      </div>
      <div class="form-group">
        <label>📞 Contact No. *</label>
        <input type="tel" id="regContact" placeholder="09123456789" inputmode="tel">
      </div>
      <button class="auth-btn" id="registerBtn">Register</button>
      <div id="registerError" class="error-message"></div>
      <div id="registerSuccess" class="success-message"></div>
    </div>
    
    <!-- Admin Login -->
    <div id="adminForm" class="auth-form hidden">
      <div class="form-group">
        <label>👨‍💼 Admin Email</label>
        <input type="email" id="adminEmail" placeholder="admin@mndr.gov.ph">
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
      </div>
      <button class="auth-btn" id="adminLoginBtn">Admin Sign In</button>
      <div id="adminError" class="error-message"></div>
    </div>
    
    <div class="auth-footer">
      <span id="authFooterText">Don't have an account? </span>
      <a id="switchToRegister">Register</a>
    </div>
    <div class="demo-notice">
      Demo: facility@hospital.gov.ph / 123456
    </div>
  </div>

  <!-- MAIN APP (Same structure as before, optimized for mobile) -->
  <div id="mainApp" class="main-app">
    <!-- App content same as previous version but with mobile optimizations -->
    <!-- [Content continues with same structure but mobile-first design] -->
  </div>
</div>

<script>
  // ========== PWA INSTALLATION ==========
  let deferredPrompt;
  
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    
    // Show install prompt after 3 seconds
    setTimeout(() => {
      if (localStorage.getItem('installPromptShown') !== 'true') {
        document.getElementById('installPrompt').classList.remove('hidden');
      }
    }, 3000);
  });
  
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {

  // Initialize app
  document.addEventListener('DOMContentLoaded', () => {
    const loadingScreen = document.getElementById('loadingScreen');
    const authScreen = document.getElementById('authScreen');
    
    // Check auth state
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        // User is signed in
        loadingScreen.classList.add('hidden');
        authScreen.classList.add('hidden');
        document.getElementById('mainApp').style.display = 'block';
        // Load user data...
      } else {
        loadingScreen.classList.add('hidden');
        authScreen.classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'none';
      }
    });
    
    // Auth tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const tabName = tab.dataset.tab;
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('adminForm').classList.add('hidden');
        
        if (tabName === 'login') {
          document.getElementById('loginForm').classList.remove('hidden');
          document.getElementById('authFooterText').textContent = "Don't have an account? ";
          document.getElementById('switchToRegister').textContent = 'Register';
        } else if (tabName === 'register') {
          document.getElementById('registerForm').classList.remove('hidden');
          document.getElementById('authFooterText').textContent = "Already have an account? ";
          document.getElementById('switchToRegister').textContent = 'Login';
        } else {
          document.getElementById('adminForm').classList.remove('hidden');
          document.getElementById('authFooterText').textContent = "Facility user? ";
          document.getElementById('switchToRegister').textContent = 'Login';
        }
      });
    });
    
    // Switch between login/register
    document.getElementById('switchToRegister').addEventListener('click', () => {
      const activeTab = document.querySelector('.auth-tab.active').dataset.tab;
      if (activeTab === 'login') {
        document.querySelector('[data-tab="register"]').click();
      } else {
        document.querySelector('[data-tab="login"]').click();
      }
    });

      document.getElementById('otherFacilityGroup').classList.toggle('hidden', e.target.value !== 'Other');
    });
